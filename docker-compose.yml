version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/probes.db
      - RESET_DEMO_DATA=true
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_PROXY_HTTP=http://backend:8000
      - VITE_PROXY_WS=ws://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
